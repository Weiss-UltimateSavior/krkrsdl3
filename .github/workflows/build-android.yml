name: Build Android

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'Res/**'
      - 'emscripten/**'
      - 'ohos/**'
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build Android APK & Native Libs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r28

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: ${{ github.workspace }}/vcpkg-root

      - name: Install Ninja
        run: sudo apt-get install -y ninja-build

      - name: Build Native Libraries
        run: |
          # Build arm64-v8a
          cmake -B out/android/arm64-v8a \
            -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg-root/scripts/buildsystems/vcpkg.cmake \
            -DVCPKG_CHAINLOAD_TOOLCHAIN_FILE=${{ steps.setup-ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
            -DVCPKG_TARGET_TRIPLET=arm64-android \
            -DANDROID=true \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-28 \
            -DCMAKE_SYSTEM_NAME=Android \
            -DCMAKE_SYSTEM_VERSION=28 \
            -DCMAKE_BUILD_TYPE=Release \
            -G Ninja
          cmake --build out/android/arm64-v8a --config Release

          # Build armeabi-v7a (vcpkg packages cached from arm64 build)
          cmake -B out/android/armeabi-v7a \
            -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg-root/scripts/buildsystems/vcpkg.cmake \
            -DVCPKG_CHAINLOAD_TOOLCHAIN_FILE=${{ steps.setup-ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
            -DVCPKG_TARGET_TRIPLET=arm-android \
            -DANDROID=true \
            -DANDROID_ABI=armeabi-v7a \
            -DANDROID_PLATFORM=android-28 \
            -DCMAKE_SYSTEM_NAME=Android \
            -DCMAKE_SYSTEM_VERSION=28 \
            -DCMAKE_BUILD_TYPE=Release \
            -G Ninja
          cmake --build out/android/armeabi-v7a --config Release

      - name: Collect Libraries for APK
        run: |
          for abi in arm64-v8a armeabi-v7a; do
            mkdir -p android/app/libs/$abi out/libs/$abi
            cp out/android/$abi/libkrkrsdl3.so android/app/libs/$abi/
            cp out/android/$abi/libkrkrsdl3.so out/libs/$abi/
            # Copy runtime shared library dependencies from vcpkg
            find ${{ github.workspace }}/vcpkg-root/installed/*-android -name "*.so" \
              -exec cp {} android/app/libs/$abi/ \; 2>/dev/null || true
            find ${{ github.workspace }}/vcpkg-root/installed/*-android -name "*.so" \
              -exec cp {} out/libs/$abi/ \; 2>/dev/null || true
          done
          echo "=== Libraries ==="
          find android/app/libs out/libs -name "*.so" -exec ls -lh {} \;

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease -PskipNativeBuild

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: krkrsdl3-release-apk
          path: out/android/app/outputs/apk/release/*.apk

      - name: Upload Native Libraries
        uses: actions/upload-artifact@v4
        with:
          name: krkr-android-libs
          path: out/libs/
